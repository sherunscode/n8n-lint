<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="552" viewBox="0 0 1360 552" role="img" aria-labelledby="title desc">
  <title id="title">n8n-lint terminal output proof</title>
  <desc id="desc">Generated from actual colored n8n-lint pass and fail CLI output.</desc>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="48" y="62" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="800">Terminal proof from real CLI output</text>
  <text x="48" y="96" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Both panels are regenerated by npm run generate:terminal-output-demo from the built CLI with FORCE_COLOR=1.</text>
  <rect x="48" y="126" width="622" height="396" rx="12" fill="#0f172a" stroke="#cbd5e1"/>
  <rect x="48" y="126" width="622" height="46" rx="12" fill="#111827"/>
  <rect x="48" y="160" width="622" height="12" fill="#111827"/>
  <circle cx="72" cy="150" r="6" fill="#ef4444"/>
  <circle cx="92" cy="150" r="6" fill="#f59e0b"/>
  <circle cx="112" cy="150" r="6" fill="#22c55e"/>
  <text x="140" y="156" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Pass output</text>
  <rect x="72" y="183" width="10" height="10" rx="5" fill="#16a34a"/>
  <text x="90" y="193" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">actual command output</text>
  <g font-family="Consolas, Menlo, Monaco, 'Liberation Mono', monospace" font-size="14">
    <text x="72" y="210"><tspan x="72" dy="0" fill="#67e8f9">$ node packages/cli/dist/bin.js check</tspan></text>
    <text x="72" y="232"><tspan x="72" dy="0" fill="#67e8f9">  examples/passing-workflow.json</tspan></text>
    <text x="72" y="254"><tspan x="72" dy="0" fill="#22c55e">PASS</tspan><tspan x="104.8" dy="0" fill="#e5e7eb"> examples/passing-workflow.json</tspan></text>
    <text x="72" y="276"><tspan x="72" dy="0" fill="#e5e7eb">Schema source: bundled-n8n-package</tspan></text>
    <text x="72" y="298"><tspan x="72" dy="0" fill="#facc15">WARN schema_source.warning: Bundled n8n package metadata is</tspan></text>
    <text x="72" y="320"><tspan x="72" dy="0" fill="#facc15">  loaded from a compact checked-in artifact; this is not live</tspan></text>
    <text x="72" y="342"><tspan x="72" dy="0" fill="#facc15">  REST validation.</tspan></text>
    <text x="72" y="364"><tspan x="72" dy="0" fill="#e5e7eb">Summary: 1 passed, 0 failed, 1 warnings, 0 skipped, 0 errors</tspan></text>
  </g>
  <rect x="690" y="126" width="622" height="396" rx="12" fill="#0f172a" stroke="#cbd5e1"/>
  <rect x="690" y="126" width="622" height="46" rx="12" fill="#111827"/>
  <rect x="690" y="160" width="622" height="12" fill="#111827"/>
  <circle cx="714" cy="150" r="6" fill="#ef4444"/>
  <circle cx="734" cy="150" r="6" fill="#f59e0b"/>
  <circle cx="754" cy="150" r="6" fill="#22c55e"/>
  <text x="782" y="156" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Fail output</text>
  <rect x="714" y="183" width="10" height="10" rx="5" fill="#dc2626"/>
  <text x="732" y="193" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">actual command output</text>
  <g font-family="Consolas, Menlo, Monaco, 'Liberation Mono', monospace" font-size="14">
    <text x="714" y="210"><tspan x="714" dy="0" fill="#67e8f9">$ node packages/cli/dist/bin.js check</tspan></text>
    <text x="714" y="232"><tspan x="714" dy="0" fill="#67e8f9">  examples/failing-dead-parameter.json</tspan></text>
    <text x="714" y="254"><tspan x="714" dy="0" fill="#f87171">FAIL</tspan><tspan x="746.8" dy="0" fill="#e5e7eb"> examples/failing-dead-parameter.json</tspan></text>
    <text x="714" y="276"><tspan x="714" dy="0" fill="#e5e7eb">Schema source: bundled-n8n-package</tspan></text>
    <text x="714" y="298"><tspan x="714" dy="0" fill="#f87171">ERROR workflow.node_parameter_unknown</tspan></text>
    <text x="714" y="320"><tspan x="714" dy="0" fill="#f87171">  $.nodes[0].parameters.notARealParameter: Unknown or dead</tspan></text>
    <text x="714" y="342"><tspan x="714" dy="0" fill="#f87171">  parameter &quot;notARealParameter&quot; for node type</tspan></text>
    <text x="714" y="364"><tspan x="714" dy="0" fill="#f87171">  &quot;n8n-nodes-base.httpRequest&quot;.</tspan></text>
    <text x="714" y="386"><tspan x="714" dy="0" fill="#facc15">WARNING schema_source.warning $: Bundled n8n package metadata is</tspan></text>
    <text x="714" y="408"><tspan x="714" dy="0" fill="#facc15">  loaded from a compact checked-in artifact; this is not live</tspan></text>
    <text x="714" y="430"><tspan x="714" dy="0" fill="#facc15">  REST validation.</tspan></text>
    <text x="714" y="452"><tspan x="714" dy="0" fill="#e5e7eb">Summary: 0 passed, 1 failed, 1 warnings, 0 skipped, 0 errors</tspan></text>
  </g>
</svg>
