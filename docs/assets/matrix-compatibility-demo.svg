<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">n8n-lint matrix compatibility proof</title>
  <desc id="desc">Generated from actual n8n-lint matrix CLI and JSON output for a fixture that fails under 2.29.6 and passes under 2.30.0.</desc>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="52" y="66" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Matrix proof from real CLI output</text>
  <text x="52" y="102" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Generated by npm run generate:matrix-demo from the built CLI and checked by npm run check:matrix-demo.</text>
  <rect x="52" y="140" width="556" height="180" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="82" y="184" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="800">n8n-nodes-base@2.29.6</text>
  <rect x="440" y="162" width="120" height="38" rx="19" fill="#ef4444"/>
  <text x="500" y="187" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">FAIL</text>
  <text x="82" y="240" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Pinned by n8n@2.29.7</text>
  <text x="82" y="271" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">workflows: 1</text>
  <text x="82" y="302" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">failed: 1</text>
  <text x="82" y="333" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">clearWarning is rejected</text>
  <rect x="672" y="140" width="556" height="180" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="702" y="184" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="800">n8n-nodes-base@2.30.0</text>
  <rect x="1060" y="162" width="120" height="38" rx="19" fill="#22c55e"/>
  <text x="1120" y="187" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">PASS</text>
  <text x="702" y="240" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Pinned by n8n@2.30.0</text>
  <text x="702" y="271" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">workflows: 1</text>
  <text x="702" y="302" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">passed: 1</text>
  <text x="702" y="333" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">clearWarning is accepted</text>
  <rect x="52" y="362" width="1176" height="204" rx="14" fill="#0f172a" stroke="#cbd5e1"/>
  <text x="82" y="400" fill="#67e8f9" font-family="Consolas, Menlo, Monaco, monospace" font-size="16">$ node packages/cli/dist/bin.js check examples/matrix-2-30-parameter-workflow.json --n8n-version=matrix</text>
  <text x="82" y="430" fill="#fca5a5" font-family="Consolas, Menlo, Monaco, monospace" font-size="16">MATRIX n8n-nodes-base@2.29.6: FAIL</text>
  <text x="82" y="458" fill="#e5e7eb" font-family="Consolas, Menlo, Monaco, monospace" font-size="16">  Summary: 0 passed, 1 failed, 1 warnings, 0 skipped, 0 errors</text>
  <text x="82" y="486" fill="#86efac" font-family="Consolas, Menlo, Monaco, monospace" font-size="16">MATRIX n8n-nodes-base@2.30.0: PASS</text>
  <text x="82" y="514" fill="#e5e7eb" font-family="Consolas, Menlo, Monaco, monospace" font-size="16">  Summary: 1 passed, 0 failed, 1 warnings, 0 skipped, 0 errors</text>
  <text x="82" y="542" fill="#fde68a" font-family="Consolas, Menlo, Monaco, monospace" font-size="16">DIFF examples/matrix-2-30-parameter-workflow.json: 2.29.6=failed, 2.30.0=passed</text>
  <text x="82" y="570" fill="#e5e7eb" font-family="Consolas, Menlo, Monaco, monospace" font-size="16">Matrix summary: 2 versions, 1 compatibility differences, 1 passed, 1 failed, 2 warnings, 0 skipped, 0 errors</text>
  <rect x="52" y="584" width="1176" height="100" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="82" y="616" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Diff: examples/matrix-2-30-parameter-workflow.json</text>
  <text x="82" y="644" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">2.29.6=failed, 2.30.0=passed; workflow.node_parameter_unknown:$.nodes[0].parameters.clearWarning</text>
  <text x="82" y="672" fill="#64748b" font-family="Consolas, Menlo, Monaco, monospace" font-size="13">$ node packages/cli/dist/bin.js check examples/matrix-2-30-parameter-workflow.json --n8n-version=matrix --json</text>
</svg>
