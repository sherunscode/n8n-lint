name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  discussions: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Setup Node
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Quality
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run quality

  runtime-matrix:
    name: Runtime (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Setup Node
        uses: actions/setup-node@v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify runtime
        run: npm run verify:fast

  action-smoke-matrix:
    name: Action smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Dogfood packaged GitHub Action
        uses: ./
        with:
          paths: |
            examples/known-http-request-workflow.json
            examples/passing-workflow.json
            examples/action smoke/passing,100%.json

  action-smoke-required:
    name: action-smoke
    if: always()
    needs: action-smoke-matrix
    runs-on: ubuntu-latest
    steps:
      - name: Verify cross-platform Action matrix
        env:
          RESULT: ${{ needs.action-smoke-matrix.result }}
        run: test "$RESULT" = "success"
