name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check examples
        run: |
          npm run check:example
          npm run check:bundled-schema

      - name: Test
        run: npm test

      - name: Audit shipping dependencies
        run: npm run audit:prod
