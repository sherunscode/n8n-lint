name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  discussions: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Quality
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run quality

      - name: Dogfood GitHub Action
        uses: ./
        with:
          paths: |
            examples/known-http-request-workflow.json
            examples/passing-workflow.json
