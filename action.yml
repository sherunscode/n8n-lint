name: n8n-lint
description: Validate n8n workflow JSON with artifact-backed schema checks.
author: She Runs Code

inputs:
  paths:
    description: Workflow JSON path, directory, or glob. For multiple values, use a multiline block with one value per line.
    required: true
  source:
    description: Schema source to use.
    required: false
    default: bundled-n8n-package
  n8n-version:
    description: Pinned bundled n8n-nodes-base version or matrix.
    required: false
    default: 2.29.6

runs:
  using: composite
  steps:
    - name: Build n8n-lint action runtime
      shell: bash
      run: |
        cd "$GITHUB_ACTION_PATH"
        npm ci
        npm run build

    - name: Check n8n workflows
      shell: bash
      env:
        N8N_LINT_PATHS: ${{ inputs.paths }}
        N8N_LINT_SOURCE: ${{ inputs.source }}
        N8N_LINT_VERSION: ${{ inputs.n8n-version }}
      run: |
        set +e
        cd "$GITHUB_WORKSPACE"
        output_file="$RUNNER_TEMP/n8n-lint-output.txt"
        json_file="$RUNNER_TEMP/n8n-lint-result.json"
        path_args=()
        while IFS= read -r path_arg; do
          if [ -n "$path_arg" ]; then
            path_args+=("$path_arg")
          fi
        done <<< "$N8N_LINT_PATHS"
        if [ "${#path_args[@]}" -eq 0 ]; then
          echo "::error title=n8n-lint input error::paths input must include at least one path, directory, or glob."
          exit 2
        fi
        node "$GITHUB_ACTION_PATH/packages/cli/dist/bin.js" check "${path_args[@]}" --source "$N8N_LINT_SOURCE" --n8n-version "$N8N_LINT_VERSION" --format github 2>&1 | tee "$output_file"
        status=${PIPESTATUS[0]}
        node "$GITHUB_ACTION_PATH/packages/cli/dist/bin.js" check "${path_args[@]}" --source "$N8N_LINT_SOURCE" --n8n-version "$N8N_LINT_VERSION" --json > "$json_file" 2>/dev/null
        badge_markdown=$(node "$GITHUB_ACTION_PATH/packages/cli/dist/bin.js" badge "$json_file" --kind last-verified 2>/dev/null || true)
        if [ -z "$badge_markdown" ]; then
          badge_markdown="Unavailable - check output was not JSON-readable."
        fi

        {
          echo "## n8n-lint"
          echo
          echo "| Field | Value |"
          echo "|---|---|"
          echo "| Status | $([ "$status" -eq 0 ] && echo "Passed" || echo "Failed") |"
          echo "| Paths | \`$N8N_LINT_PATHS\` |"
          echo "| Source | \`$N8N_LINT_SOURCE\` |"
          echo "| n8n version selector | \`$N8N_LINT_VERSION\` |"
          echo "| Last verified badge | $badge_markdown |"
          echo
          echo "### Output"
          echo
          echo "\`\`\`text"
          tail -n 200 "$output_file"
          echo "\`\`\`"
        } >> "$GITHUB_STEP_SUMMARY"

        exit "$status"
